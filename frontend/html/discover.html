<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover - TravelSync</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/discover.css">
</head>

<body>
    <div class="page-content">
        <div class="top-bar">
            <div class="top-bar-left">
                <h1 class="brand-title">TravelSync</h1>
                <div class="location-indicator">
                    <span>📍</span>
                    <span id="currentLocation">New York</span>
                </div>
            </div>
            <div class="top-bar-right">
                <button class="icon-btn" onclick="window.location.href='map.html'" title="Map">🗺️</button>
                <button class="icon-btn" onclick="openSearch()">🔍</button>
                <button class="icon-btn" onclick="openFilters()">⚙️</button>
            </div>
        </div>

        <div class="tab-switcher">
            <button class="tab-btn" data-tab="people" onclick="switchTab('people')">👥 People</button>
            <button class="tab-btn active" data-tab="experiences" onclick="switchTab('experiences')">✨ Experiences</button>
            <button class="tab-btn" data-tab="nearby" onclick="switchTab('nearby')">📍 Nearby</button>
            <button class="tab-btn" data-tab="trending" onclick="switchTab('trending')">🔥 Trending</button>
        </div>

        <div class="feed-container" id="feedContainer">
        </div>

        <button class="fab-btn" onclick="showCreateExperienceModal()" title="Create Experience">+</button>

        <nav class="bottom-nav">
            <a href="discover.html" class="nav-item active">
                <span class="nav-icon">🌟</span>
                <span>Discover</span>
            </a>
            <a href="plans.html" class="nav-item">
                <span class="nav-icon">📋</span>
                <span>Plans</span>
            </a>
            <a href="messages.html" class="nav-item">
                <span class="nav-icon">💬</span>
                <span>Messages</span>
            </a>
            <a href="legends.html" class="nav-item">
                <span class="nav-icon">📜</span>
                <span>Legends</span>
            </a>
            <a href="profile.html" class="nav-item">
                <span class="nav-icon">👤</span>
                <span>Profile</span>
            </a>
        </nav>
    </div>

    <script src="../js/runtime-config.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/discover.js"></script>
</body>
</html>
